<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viora — 新しい文化を、ともに。</title>
  <meta name="description" content="VTuber のための総合プラットフォーム。まもなく公開。">

  <!-- OGP -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://viora.social/">
  <meta property="og:title" content="Viora — 新しい文化を、ともに。">
  <meta property="og:description" content="VTuber のための総合プラットフォーム。まもなく公開。">
  <meta property="og:image" content="https://viora.social/ogp.png">
  <meta property="og:locale" content="ja_JP">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@viora_social">
  <meta name="twitter:title" content="Viora — 新しい文化を、ともに。">
  <meta name="twitter:description" content="VTuber のための総合プラットフォーム。まもなく公開。">
  <meta name="twitter:image" content="https://viora.social/ogp.png">

  <!-- Cloudflare Web Analytics -->
  <!-- TODO: トークンを設定する -->
  <!-- <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_TOKEN"}'></script> -->

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@300&display=swap" rel="stylesheet">

  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>

    <!-- ロゴ -->
    <div class="logo">
      <img src="assets/logo.svg" alt="" class="logo-symbol" aria-hidden="true">
      <span class="logo-wordmark">VIORA</span>
    </div>

    <!-- ステータスバッジ -->
    <div class="status-badge" role="status">
      <span class="status-dot" aria-hidden="true"></span>
      まもなく公開
    </div>

    <!-- プラットフォーム説明 -->
    <p class="platform-label">Platform for <strong class="platform-label-vtuber">VTuber</strong></p>

    <!-- メインコピー -->
    <h1>新しい文化を、ともに。</h1>

    <!-- アクター -->
    <section class="actors" aria-label="対象ユーザー">
      <svg class="actor-triangle" viewBox="0 0 280 228" aria-hidden="true">
        <defs>
          <linearGradient id="lg1" x1="140" y1="38" x2="45" y2="188" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#f0d0dc" stop-opacity="0.6"/>
            <stop offset="50%" stop-color="#c9879e" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#f0d0dc" stop-opacity="0.6"/>
          </linearGradient>
          <linearGradient id="lg2" x1="45" y1="188" x2="235" y2="188" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#f0d0dc" stop-opacity="0.6"/>
            <stop offset="50%" stop-color="#c9879e" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#f0d0dc" stop-opacity="0.6"/>
          </linearGradient>
          <linearGradient id="lg3" x1="235" y1="188" x2="140" y2="38" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#f0d0dc" stop-opacity="0.6"/>
            <stop offset="50%" stop-color="#c9879e" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#f0d0dc" stop-opacity="0.6"/>
          </linearGradient>
        </defs>
        <!-- Triangle fill -->
        <polygon points="140,38 45,188 235,188" fill="rgba(201,135,158,0.04)" stroke="none"/>
        <!-- Edges -->
        <line x1="140" y1="38" x2="45" y2="188" stroke="url(#lg1)" stroke-width="1"/>
        <line x1="45" y1="188" x2="235" y2="188" stroke="url(#lg2)" stroke-width="1"/>
        <line x1="235" y1="188" x2="140" y2="38" stroke="url(#lg3)" stroke-width="1"/>
        <!-- Nodes -->
        <circle cx="140" cy="38" r="4" fill="#f0d0dc"/>
        <circle cx="45" cy="188" r="4" fill="#f0d0dc"/>
        <circle cx="235" cy="188" r="4" fill="#f0d0dc"/>
        <!-- Labels -->
        <text x="140" y="20" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="14" font-weight="500" letter-spacing="2" fill="#f0d0dc">ライバー</text>
        <text x="45" y="215" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="14" font-weight="500" letter-spacing="2" fill="#f0d0dc">リスナー</text>
        <text x="235" y="215" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-size="14" font-weight="500" letter-spacing="2" fill="#f0d0dc">クリエイター</text>
      </svg>
    </section>

    <!-- CTA -->
    <section class="cta">
      <a href="https://x.com/viora_social" target="_blank" rel="noopener noreferrer" class="btn-x">
        <svg class="x-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.259 5.63L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/>
        </svg>
        X でフォローする
      </a>
    </section>

  </main>

  <footer>
    <p>© 2026 Viora &nbsp;|&nbsp; viora.social</p>
  </footer>
</body>
</html>
